<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Media Slider — Web Component demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: #1a1a1a; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body>
    <media-slider id="feed"></media-slider>

    <script src="polyfills.js" type="module"></script>
    <script src="main.js" type="module"></script>

    <script>
        const slides = [
            {
                type: 'image',
                media: 'https://picsum.photos/id/1011/720/1280',
                user: '@mountain_lover',
                avatar: 'https://i.pravatar.cc/100?img=12',
                caption: 'Aventura en la montaña 🏔️ #fyp',
                music: 'sonido original',
                counts: { like: '1.2K', comment: '340', bookmark: '89' },
            },
            {
                type: 'video',
                media: 'https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/360/Big_Buck_Bunny_360_10s_1MB.mp4',
                user: '@big_buck_bunny',
                avatar: 'https://i.pravatar.cc/100?img=68',
                caption: 'Vídeo con autoplay + loop 🎬',
                music: 'Open Source Theme',
                counts: { like: '12.8K', comment: '1.5K' },
            },
            {
                type: 'image',
                media: 'https://picsum.photos/id/1015/720/1280',
                user: '@river_vibes',
                avatar: 'https://i.pravatar.cc/100?img=32',
                caption: 'Sonido del río al amanecer 🌅',
                music: 'Lo-Fi Morning',
                counts: { like: '8.5K', comment: '910' },
            },
        ];

        const el = document.getElementById('feed');

        customElements.whenDefined('media-slider').then(() => {
            el.slides = slides;
            el.addEventListener('doubleTap', () => console.log('liked'));
        });
    </script>
</body>
</html>
